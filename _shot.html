<!doctype html><html><body style="margin:0;background:#fff">
<iframe id="f" src="./index.html" style="width:1440px;height:1100px;border:0;display:block"></iframe>
<script>
const targetScene = parseInt(new URLSearchParams(location.search).get('s')||'0', 10);
const settle = parseInt(new URLSearchParams(location.search).get('w')||'2500', 10);
const f = document.getElementById('f');
f.addEventListener('load', () => {
  setTimeout(() => {
    if (targetScene === 0) { document.title = 'READY'; return; }
    const doc = f.contentDocument;
    doc.querySelector('#a1-begin')?.click();
    setTimeout(() => {
      let i = 1;
      const adv = setInterval(() => {
        if (i >= targetScene) { clearInterval(adv); setTimeout(()=>document.title='READY', settle); return; }
        doc.querySelector('[data-act="next"]')?.click();
        i++;
      }, 80);
    }, 400);
  }, 1500);
});
</script>
</body></html>
