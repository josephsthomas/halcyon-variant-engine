<!-- Act 1 — Workflow Overview Page -->
<section id="act-1" class="act act--1 hidden" aria-label="Workflow overview"></section>

<!-- Act 2 — Visual Walkthrough -->
<section id="act-2" class="act act--2 hidden" aria-label="Visual walkthrough">

  <header id="breadcrumb-host" class="breadcrumb-host"></header>
  <h2 id="scene-title" class="scene-title"></h2>

  <footer id="scene-controls" class="scene-controls"></footer>

<nav id="meta-controls" class="meta-controls" aria-label="Playback"></nav>
